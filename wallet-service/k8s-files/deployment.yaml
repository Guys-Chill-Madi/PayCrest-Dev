apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-service
  namespace: pycrest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wallet-service
  template:
    metadata:
      labels:
        app: wallet-service
    spec:
      serviceAccountName: wallet-service-sa

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: wallet-service
                topologyKey: kubernetes.io/hostname

      containers:
        - name: wallet-service
          image: chillmadiguys/wallet-service:v1.1.0
          ports:
            - containerPort: 8000

          envFrom:
            - configMapRef:
                name: pycrest-global-config
            - secretRef:
                name: pycrest-global-secret

          volumeMounts:
            - name: uploads
              mountPath: /app/uploads

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: pycrest-uploads-pvc