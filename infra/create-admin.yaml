apiVersion: batch/v1
kind: Job
metadata:
  name: create-admin
  namespace: pc-app
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: pc-upload-pvc
      containers:
        - name: create-admin
          image: chillmadiguys/auth-service:v1.1.1  
          command: ["python", "-c"]
          args:
            - |
              import asyncio
              from datetime import datetime
              from app.database.mongo import get_db
              from app.core.security import hash_password
              from app.models.enums import Roles
              from app.utils.sequences import next_customer_id

              async def run():
                  db = await get_db()
                  existing = await db.staff_users.find_one({"email": "admin@lms.com"})
                  if existing:
                      print("Admin already exists, id=" + str(existing.get("_id")))
                      return
                  cust_id = await next_customer_id()
                  doc = {
                      "_id": cust_id,
                      "full_name": "System Admin",
                      "email": "admin@lms.com",
                      "password": hash_password("admin123"),
                      "phone": None,
                      "dob": None,
                      "gender": None,
                      "pan_number": None,
                      "role": Roles.ADMIN.value,
                      "is_active": True,
                      "created_at": datetime.utcnow(),
                  }
                  await db.staff_users.insert_one(doc)
                  print("Admin created successfully, id=" + str(cust_id))

              asyncio.run(run())
          envFrom:
            - secretRef:
                name: pc-secrets-global  
          volumeMounts:
            - mountPath: /app/uploads
              name: uploads