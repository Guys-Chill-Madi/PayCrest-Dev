apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pycrest-main-route
  namespace: pycrest
spec:
  parentRefs:
    - name: pycrest-gateway
      namespace: pycrest
  rules:
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: frontend
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: api-gateway
          port: 3000
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80