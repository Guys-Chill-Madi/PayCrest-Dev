---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gateway-shield
  namespace: pc-edge
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: pc-gateway
  egress:
    # DNS - namespace selector for pod IPs
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # DNS - ClusterIP direct
    - to:
        - ipBlock:
            cidr: 10.96.0.10/32
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # pc-app services via pod IPs (namespace selector)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: pc-app
      ports:
        - protocol: TCP
          port: 8000
    # pc-app services via ClusterIP CIDR
    # This is critical - Calico sees Service traffic as CIDR not namespace
    - to:
        - ipBlock:
            cidr: 10.96.0.0/12
      ports:
        - protocol: TCP
          port: 8000