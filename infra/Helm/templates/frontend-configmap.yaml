apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  namespace: pc-frontend
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Health check endpoint — liveness/readiness probes hit this
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Proxy /api/* to the api-gateway using full cluster DNS
        # Fix: nginx baked in "api-gateway" short name which doesn't resolve
        # cross-namespace. Must use full FQDN: <svc>.<ns>.svc.cluster.local
        location /api/ {
            proxy_pass http://api-gateway.pc-edge.svc.cluster.local:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # All other routes → React SPA (client-side routing)
        location / {
            try_files $uri $uri/ /index.html;
        }
    }