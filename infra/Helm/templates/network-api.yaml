apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gateway-shield
  namespace: pc-edge
spec:
  podSelector: {} 
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: pc-gateway 
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: pc-app
    ports:
    - protocol: TCP
      port: 8000

  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53