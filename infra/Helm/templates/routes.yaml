apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: paycrest-route
  namespace: pc-gateway
spec:
  parentRefs:
    - name: paycrest-kgate
  rules:
    # Bug 9 fixed: original was missing the "-" before "path:" inside matches
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        # Bug 10 fixed: was "name: frontend" — actual Service is named "frontend-service"
        - name: frontend-service
          namespace: pc-frontend
          port: 80

    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: api-gateway
          namespace: pc-edge
          port: 3000

    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        # Bug 10 fixed: same fix here
        - name: frontend-service
          namespace: pc-frontend
          port: 80