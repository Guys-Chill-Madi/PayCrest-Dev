# HTTPRoutes for all dashboards
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-route
  namespace: monitoring
spec:
  parentRefs:
  - name: paycrest-kgate
    namespace: pc-gateway
  hostnames:
  - "grafana.paycrest.online"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: grafana
      port: 80
---
