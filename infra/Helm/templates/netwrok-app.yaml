apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: app-isolation
  namespace: pc-app
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from api-gateway in pc-edge namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: pc-edge
      ports:
        - protocol: TCP
          port: 8000
    # Allow inter-service traffic within pc-app (service-to-service calls)
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8000
  egress:
    # Allow outbound to MongoDB in pc-data
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: pc-data
      ports:
        - protocol: TCP
          port: 27017
    # Allow DNS resolution via CoreDNS in kube-system
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow inter-service HTTP calls within pc-app
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8000