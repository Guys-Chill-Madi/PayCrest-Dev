apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: pc-app
  labels:
    app: payment-service
    {{- include "paycrest.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.paymentService.replicas }}
  selector:
    matchLabels:
      app: payment-service
  {{- include "paycrest.rollingUpdate" . | nindent 2 }}
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      {{- include "paycrest.antiAffinity" "payment-service" | nindent 6 }}
      containers:
        - name: payment-cont
          image: {{ .Values.paymentService.image }}
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources:
            {{- toYaml .Values.paymentService.resources | nindent 12 }}
          envFrom:
            {{- include "paycrest.appEnvFrom" . | nindent 12 }}
          {{- include "paycrest.appProbes" . | nindent 10 }}
