apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: pc-data
  labels:
    app: mongodb
    {{- include "paycrest.labels" . | nindent 4 }}
spec:
  replicas: 1
  serviceName: mongodb
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: {{ .Values.mongodb.image }}
          imagePullPolicy: Always
          ports:
            - containerPort: 27017
          resources:
            {{- toYaml .Values.mongodb.resources | nindent 12 }}
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: MONGO_INITDB_ROOT_USERNAME
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: MONGO_INITDB_ROOT_PASSWORD
            - name: MONGO_INITDB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: MONGO_INITDB_DATABASE
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes:
          - "ReadWriteOnce"
        storageClassName: nfs-csi
        resources:
          requests:
            storage: {{ .Values.mongodb.storage }}
