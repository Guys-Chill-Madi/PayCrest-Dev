apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: pc-app
  labels:
    app: auth-service
    {{- include "paycrest.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.authService.replicas }}
  selector:
    matchLabels:
      app: auth-service
  {{- include "paycrest.rollingUpdate" . | nindent 2 }}
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      {{- include "paycrest.antiAffinity" "auth-service" | nindent 6 }}
      containers:
        - name: auth-service
          image: {{ .Values.authService.image }}
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources:
            {{- toYaml .Values.authService.resources | nindent 12 }}
          envFrom:
            {{- include "paycrest.appEnvFrom" . | nindent 12 }}
          volumeMounts:
            {{- include "paycrest.uploadVolumeMount" . | nindent 12 }}
          {{- include "paycrest.appProbes" . | nindent 10 }}
      volumes:
        {{- include "paycrest.uploadVolume" . | nindent 8 }}