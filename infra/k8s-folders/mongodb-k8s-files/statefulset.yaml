apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: pycrest
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      serviceAccountName: mongodb-sa
      containers:
        - name: mongodb
          image: mongo:7.0
          ports:
            - containerPort: 27017

          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: pycrest
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: pycrest123
            - name: MONGO_INITDB_DATABASE
              value: pycrest

          volumeMounts:
            - name: mongo-data
              mountPath: /data/db

          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi

  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: nfs-csi
        resources:
          requests:
            storage: 10Gi