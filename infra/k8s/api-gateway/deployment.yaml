apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: pc-edge
  labels:
    app: api-gateway
spec:
  replicas: 4
  selector:
    matchLabels:
      app: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: api-gateway
            topologyKey: "kubernetes.io/hostname"
              
      containers:
        - name: api-gateway
          image: chillmadiguys/api-gateway:v1.1.2
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: pc-secret-api
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
              initialDelaySeconds: 15
              periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
              initialDelaySeconds: 10
              periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          
