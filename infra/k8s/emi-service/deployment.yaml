apiVersion: apps/v1
kind: Deployment
metadata:
  name: emi-service
  namespace: pc-app
spec:
  replicas: 1
  selector:
    matchLabels:
      emi: service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        emi: service
    spec:
      containers:
        - name: emi-container
          image: chillmadiguys/emi-service:v1.1.1
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: pc-config-global
            - secretRef:
                name: pc-secrets-global
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
          #   timeoutSeconds: 5
          #   failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          #   timeoutSeconds: 5
          #   failureThreshold: 3