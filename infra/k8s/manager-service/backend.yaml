apiVersion: apps/v1
kind: Deployment
metadata:
  name: manager-service
  namespace: pc-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: manager-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: manager-service
    spec:
      containers:
        - name: manager-service
          image: chillmadiguys/manager-service:v1.1.1
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: manager-service-config
            - secretRef:
                name: manager-service-secret

          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: manager-pvc
