apiVersion: apps/v1
kind: Deployment
metadata:
  name: manager-service
  namespace: pc-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: manager-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: manager-service
    spec:
      containers:
        - name: manager-service
          image: chillmadiguys/manager-service:v1.1.1
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: pc-config-global
            - secretRef:
                name: pc-secrets-global

          volumeMounts:
            - name: manager-volume
              mountPath: /app/uploads
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"
              
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          #   timeoutSeconds: 2
          #   failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            # timeoutSeconds: 2
            # failureThreshold: 3
            
        
   
      volumes:
        - name: manager-volume
          persistentVolumeClaim:
            claimName: pc-upload-pvc
