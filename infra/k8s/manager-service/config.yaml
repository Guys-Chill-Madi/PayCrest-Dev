apiVersion: v1
kind: ConfigMap
metadata:
  name: manager-service-config
  namespace: pc-app
data:
  SERVICE_NAME: manager-service
  PORT: "3008"

  MONGODB_DB: pycrest

  JWT_ALGORITHM: HS256
  JWT_EXPIRE_MINUTES: "60"

  ENVIRONMENT: development
  UPLOAD_BASE_PATH: /app/uploads

  AUTH_SERVICE_URL: "http://auth-service:8000"
  LOAN_SERVICE_URL: "http://loan-service:8000"
  EMI_SERVICE_URL: "http://emi-service:8000"
  WALLET_SERVICE_URL: "http://wallet-service:8000"
  PAYMENT_SERVICE_URL: "http://payment-service:8000"
  VERIFICATION_SERVICE_URL: "http://verification-service:8000"
  ADMIN_SERVICE_URL: "http://admin-service:8000"
  MANAGER_SERVICE_URL: "http://manager-service:8000"