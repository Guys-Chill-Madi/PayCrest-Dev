apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-deploy
  namespace: pc-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  strategy:
    type: RollingUpdate
    rollingUpdate: 
      maxUnavailable: 1
      maxSurge: 1    
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In 
                values:
                  - payment-service
                topologyKey: kubernetes.io/hostname

      containers:
        - name: payment-cont
          image: chillmadiguys/payment-service:v1.1.1
          imagePullPolicy: Always
          ports:
            - containerPort: 8000

          envFrom:
            - configMapRef:
                name: payment-service-config
            - secretRef:
                name: payment-service-secret

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi