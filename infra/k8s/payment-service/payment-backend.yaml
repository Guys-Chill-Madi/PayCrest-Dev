apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: pc-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: payment-service
                topologyKey: kubernetes.io/hostname

      containers:
        - name: payment-service
          image: chillmadiguys/payment-service:v1.1.1
          ports:
            - containerPort: 8000

          envFrom:
            - configMapRef:
                name: payment-service-config
            - secretRef:
                name: payment-service-secret

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi