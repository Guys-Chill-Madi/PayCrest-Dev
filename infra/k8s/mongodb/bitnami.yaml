apiVersion: mongodbcommunity.mongodb.com/v1
kind: MongoDBCommunity
metadata:
  name: mongodb
  namespace: pc-data
spec:
  members: 3
  type: ReplicaSet
  version: "7.0"

  security:
    authentication:
      modes: ["SCRAM"]

  users:
    - name: pycrest
      db: admin
      passwordSecretRef:
        name: mongo-secret
        key: password
      roles:
        - name: readWriteAnyDatabase
          db: admin

  statefulSet:
    spec:
      template:
        spec:
          containers:
            - name: mongod
              resources:
                requests:
                  cpu: "250m"
                  memory: "512Mi"
                limits:
                  cpu: "500m"
                  memory: "1Gi"

      volumeClaimTemplates:
        - metadata:
            name: data-volume
          spec:
            accessModes: ["ReadWriteOnce"]
            storageClassName: nfs-csi
            resources:
              requests:
                storage: 10Gi