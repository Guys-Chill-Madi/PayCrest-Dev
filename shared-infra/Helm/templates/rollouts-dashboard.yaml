apiVersion: apps/v1
kind: Deployment
metadata:
  name: rollouts-dashboard
  namespace: argo-rollouts
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rollouts-dashboard
  template:
    metadata:
      labels:
        app: rollouts-dashboard
    spec:
      serviceAccountName: rollouts-dashboard-sa
      containers:
        - name: dashboard
          image: quay.io/argoproj/kubectl-argo-rollouts:latest
          command:
            - kubectl-argo-rollouts
            - dashboard
            - --port=3100
          ports:
            - containerPort: 3100
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      

---

apiVersion: v1
kind: Service
metadata:
  name: rollouts-dashboard
  namespace: argo-rollouts
spec:
  type: ClusterIP
  selector:
    app: rollouts-dashboard
  ports:
    - port: 3100
      targetPort: 3100

---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: rollouts-dashboard-sa
  namespace: argo-rollouts

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rollouts-dashboard-role
rules:
- apiGroups: ["argoproj.io"]
  resources:
    - rollouts
    - rollouts/scale
    - rollouts/status
    - analysisruns
    - analysisruns/finalizers
    - experiments
    - analysistemplates
    - clusteranalysistemplates
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

- apiGroups: [""]
  resources:
    - pods
    - pods/log
    - services
    - namespaces
    - replicationcontrollers
    - persistentvolumeclaims
    - configmaps
    - events
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

- apiGroups: ["apps"]
  resources:
    - replicasets
    - deployments
    - statefulsets
    - daemonsets
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

- apiGroups: ["batch"]
  resources:
    - jobs
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

- apiGroups: ["networking.k8s.io"]
  resources:
    - ingresses
  verbs: ["get", "list", "watch"]

- apiGroups: ["extensions"]
  resources:
    - ingresses
  verbs: ["get", "list", "watch"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rollouts-dashboard-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rollouts-dashboard-role
subjects:
- kind: ServiceAccount
  name: rollouts-dashboard-sa
  namespace: argo-rollouts

