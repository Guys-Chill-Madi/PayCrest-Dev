apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loan-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Guys-Chill-Madi/PayCrest-Dev
    targetRevision: master
    path: loan-service/Helm
  destination:
    server: https://kubernetes.default.svc
    namespace: pc-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false