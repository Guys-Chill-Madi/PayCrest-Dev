apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Guys-Chill-Madi/PayCrest-Dev
    targetRevision: master
    path: frontend/Helm
  destination:
    server: https://kubernetes.default.svc
    namespace: pc-frontend
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false