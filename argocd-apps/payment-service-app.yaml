apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payment-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Guys-Chill-Madi/PayCrest-Dev
    targetRevision: master
    path: payment-service/Helm
  destination:
    server: https://kubernetes.default.svc
    namespace: pc-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false