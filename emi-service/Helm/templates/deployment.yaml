apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: emi-service
  namespace: pc-app
  labels:
    app: emi-service
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  replicas: {{ .Values.emiService.replicas }}
  selector:
    matchLabels:
      app: emi-service
  template:
    metadata:
      labels:
        app: emi-service
    spec:
      containers:
        - name: emi-container
          image: {{ .Values.emiService.image }}
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources:
            {{- toYaml .Values.emiService.resources | nindent 12 }}
          envFrom:
            - configMapRef:
                name: pc-config-global
            - secretRef:
                name: pc-secrets-global
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
  strategy:
    blueGreen:
      activeService: emi-service
      previewService: emi-service-preview
      autoPromotionEnabled: false