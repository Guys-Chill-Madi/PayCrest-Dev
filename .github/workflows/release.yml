name: Release Pipeline

on:
  release:
    types: [published]

jobs:
  release:
    name: Build, Scan, Push and Update Helm Values
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          ref: master
          fetch-depth: 0

      - name: Parse release tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [[ ! "$TAG" =~ ^(.+)-(v[0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "::error::Tag must follow format: service-name-vX.Y.Z"
            exit 1
          fi
          SERVICE="${BASH_REMATCH[1]}"
          VERSION="${BASH_REMATCH[2]}"
          echo "SERVICE=$SERVICE" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "IMAGE=chillmadiguys/$SERVICE" >> $GITHUB_ENV
          echo "Parsed: SERVICE=$SERVICE VERSION=$VERSION"

      - name: Validate service name
        run: |
          VALID="loan-service auth-service admin-service payment-service verification-service wallet-service emi-service manager-service api-gateway frontend"
          if ! echo "$VALID" | grep -qw "${{ env.SERVICE }}"; then
            echo "::error::Unknown service '${{ env.SERVICE }}'"
            exit 1
          fi
          echo "Service validated: ${{ env.SERVICE }}"

      - name: Set HELM_KEY for this service
        run: |
          case "${{ env.SERVICE }}" in
            loan-service)         echo "HELM_KEY=loanService" >> $GITHUB_ENV ;;
            auth-service)         echo "HELM_KEY=authService" >> $GITHUB_ENV ;;
            admin-service)        echo "HELM_KEY=adminService" >> $GITHUB_ENV ;;
            payment-service)      echo "HELM_KEY=paymentService" >> $GITHUB_ENV ;;
            verification-service) echo "HELM_KEY=verificationService" >> $GITHUB_ENV ;;
            wallet-service)       echo "HELM_KEY=walletService" >> $GITHUB_ENV ;;
            emi-service)          echo "HELM_KEY=emiService" >> $GITHUB_ENV ;;
            manager-service)      echo "HELM_KEY=managerService" >> $GITHUB_ENV ;;
            api-gateway)          echo "HELM_KEY=apiGateway" >> $GITHUB_ENV ;;
            frontend)             echo "HELM_KEY=frontend" >> $GITHUB_ENV ;;
          esac

      - name: Get SHA from test branch
        run: |
          git fetch origin test
          SHA=$(git show origin/test:${{ env.SERVICE }}/.last-sha 2>/dev/null | tr -d '[:space:]')
          if [ -z "$SHA" ] || [ "$SHA" = "initial" ]; then
            echo "::error::No valid SHA found for ${{ env.SERVICE }}"
            exit 1
          fi
          echo "SHA=$SHA" >> $GITHUB_ENV
          echo "Found SHA: $SHA"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull SHA image
        run: |
          docker pull ${{ env.IMAGE }}:${{ env.SHA }}

      - name: Trivy scan before release
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE }}:${{ env.SHA }}'
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH

      - name: Retag and push to Docker Hub
        run: |
          docker tag ${{ env.IMAGE }}:${{ env.SHA }} ${{ env.IMAGE }}:${{ env.VERSION }}
          docker tag ${{ env.IMAGE }}:${{ env.SHA }} ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ env.VERSION }}
          docker push ${{ env.IMAGE }}:latest

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update standalone service Helm values.yaml
        run: |
          if [ -f "${{ env.SERVICE }}/helm/values.yaml" ]; then
            FILE="${{ env.SERVICE }}/helm/values.yaml"
          else
            FILE="${{ env.SERVICE }}/Helm/values.yaml"
          fi
          yq -i '.image = "${{ env.IMAGE }}:${{ env.VERSION }}"' "$FILE"
          echo "HELM_VALUES_FILE=$FILE" >> $GITHUB_ENV
          echo "✅ Updated $FILE"

      - name: Update all 7 infra/Helm values files
        run: |
          FILES=(
            "infra/Helm/values.yaml"
            "infra/Helm/values-noel.yaml"
            "infra/Helm/values-chandana.yaml"
            "infra/Helm/values-nimesh.yaml"
            "infra/Helm/values-praveen.yaml"
            "infra/Helm/values-surya.yaml"
            "infra/Helm/values-thanu.yaml"
          )
          for FILE in "${FILES[@]}"; do
            if [ -f "$FILE" ]; then
              yq -i '.${{ env.HELM_KEY }}.image = "${{ env.IMAGE }}:${{ env.VERSION }}"' "$FILE"
              echo "✅ Done: $FILE"
            else
              echo "⚠️ File not found: $FILE"
            fi
          done

      - name: Commit and push via release branch
        run: |
          git config user.email "devops@paycrest.com"
          git config user.name "PayCrest DevOps Bot"

          BRANCH="release/${{ env.SERVICE }}-${{ env.VERSION }}"
          git checkout -b $BRANCH

          git add \
            ${{ env.HELM_VALUES_FILE }} \
            infra/Helm/values.yaml \
            infra/Helm/values-noel.yaml \
            infra/Helm/values-chandana.yaml \
            infra/Helm/values-nimesh.yaml \
            infra/Helm/values-praveen.yaml \
            infra/Helm/values-surya.yaml \
            infra/Helm/values-thanu.yaml

          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

          if git diff --staged --quiet; then
            echo "No changes to commit — image already up to date"
            echo "SKIP_PR=true" >> $GITHUB_ENV
            exit 0
          fi

          git commit -m "release: ${{ env.SERVICE }} → ${{ env.VERSION }} [skip ci]"
          git push origin $BRANCH

      - name: Auto-merge PR to master
        if: env.SKIP_PR != 'true'
        run: |
          gh pr create \
            --title "release: ${{ env.SERVICE }} → ${{ env.VERSION }}" \
            --body "Automated release — updates Helm image tags to ${{ env.VERSION }}" \
            --base master \
            --head ${{ env.BRANCH }}

          gh pr merge ${{ env.BRANCH }} \
            --merge \
            --admin \
            --delete-branch

          echo "✅ Merged to master successfully"
          echo "MERGED=true" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Send SUCCESS notification
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.DEVELOPMENT_TEAM_EMAIL }}
          from: PayCrest DevOps <${{ secrets.MAIL_USERNAME }}>
          subject: "🚀 Released: ${{ env.SERVICE }} ${{ env.VERSION }}"
          html_body: |
            <div style="font-family:Arial,sans-serif;max-width:600px;margin:0 auto;border:1px solid #ddd;border-radius:8px;overflow:hidden">
              <div style="background:#5cb85c;color:white;padding:20px">
                <h2 style="margin:0">🚀 Release Successful</h2>
                <p style="margin:6px 0 0;opacity:0.9">${{ env.SERVICE }} ${{ env.VERSION }}</p>
              </div>
              <div style="padding:20px">
                <table style="width:100%;border-collapse:collapse;font-size:14px">
                  <tr style="border-bottom:1px solid #eee">
                    <td style="padding:8px;color:#6c757d;width:160px">Service</td>
                    <td style="padding:8px;font-weight:bold">${{ env.SERVICE }}</td>
                  </tr>
                  <tr style="border-bottom:1px solid #eee">
                    <td style="padding:8px;color:#6c757d">Version</td>
                    <td style="padding:8px;font-weight:bold;color:#28a745">${{ env.VERSION }}</td>
                  </tr>
                  <tr style="border-bottom:1px solid #eee">
                    <td style="padding:8px;color:#6c757d">SHA Used</td>
                    <td style="padding:8px;font-family:monospace">${{ env.SHA }}</td>
                  </tr>
                  <tr style="border-bottom:1px solid #eee">
                    <td style="padding:8px;color:#6c757d">Docker Image</td>
                    <td style="padding:8px;font-family:monospace">chillmadiguys/${{ env.SERVICE }}:${{ env.VERSION }}</td>
                  </tr>
                  <tr style="border-bottom:1px solid #eee">
                    <td style="padding:8px;color:#6c757d">Released By</td>
                    <td style="padding:8px">${{ github.actor }}</td>
                  </tr>
                  <tr>
                    <td style="padding:8px;color:#6c757d">Helm Values Updated</td>
                    <td style="padding:8px;font-size:12px">
                      ${{ env.SERVICE }}/Helm/values.yaml<br>
                      infra/Helm/values.yaml<br>
                      infra/Helm/values-noel.yaml<br>
                      infra/Helm/values-chandana.yaml<br>
                      infra/Helm/values-nimesh.yaml<br>
                      infra/Helm/values-praveen.yaml<br>
                      infra/Helm/values-surya.yaml<br>
                      infra/Helm/values-thanu.yaml
                    </td>
                  </tr>
                </table>
                <div style="background:#d4edda;border:1px solid #c3e6cb;border-radius:4px;padding:12px 16px;margin-top:16px">
                  <p style="margin:0;color:#155724;font-size:14px">
                    ✅ All Helm values.yaml files committed and merged to master.<br>
                    ArgoCD will detect the change and sync <strong>${{ env.SERVICE }}</strong> automatically within 3 minutes.
                  </p>
                </div>
                <div style="text-align:center;margin-top:20px">
                  <a href="https://github.com/${{ github.repository }}/releases/tag/${{ github.event.release.tag_name }}"
                     style="background:#24292e;color:white;padding:10px 24px;border-radius:6px;text-decoration:none;font-size:14px;display:inline-block">
                    View Release
                  </a>
                </div>
              </div>
              <div style="background:#f8f9fa;padding:10px 20px;border-top:1px solid #dee2e6;text-align:center">
                <p style="margin:0;font-size:12px;color:#6c757d">PayCrest DevOps • ${{ github.repository }}</p>
              </div>
            </div>

      - name: Send FAILURE notification
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.DEVELOPMENT_TEAM_EMAIL }}
          from: PayCrest DevOps <${{ secrets.MAIL_USERNAME }}>
          subject: "❌ Release Failed: ${{ env.SERVICE }} ${{ env.VERSION }}"
          html_body: |
            <div style="font-family:Arial,sans-serif;max-width:600px;margin:0 auto;border:1px solid #ddd;border-radius:8px;overflow:hidden">
              <div style="background:#d9534f;color:white;padding:20px">
                <h2 style="margin:0">❌ Release Failed</h2>
                <p style="margin:6px 0 0;opacity:0.9">${{ env.SERVICE }} ${{ env.VERSION }}</p>
              </div>
              <div style="padding:20px">
                <table style="width:100%;border-collapse:collapse;font-size:14px">
                  <tr style="border-bottom:1px solid #eee">
                    <td style="padding:8px;color:#6c757d;width:160px">Service</td>
                    <td style="padding:8px;font-weight:bold">${{ env.SERVICE }}</td>
                  </tr>
                  <tr style="border-bottom:1px solid #eee">
                    <td style="padding:8px;color:#6c757d">Version</td>
                    <td style="padding:8px;font-weight:bold">${{ env.VERSION }}</td>
                  </tr>
                  <tr style="border-bottom:1px solid #eee">
                    <td style="padding:8px;color:#6c757d">Released By</td>
                    <td style="padding:8px">${{ github.actor }}</td>
                  </tr>
                </table>
                <div style="background:#f8d7da;border:1px solid #f5c6cb;border-radius:4px;padding:12px 16px;margin-top:16px">
                  <p style="margin:0;color:#721c24;font-size:14px">
                    ❌ Release pipeline failed. Helm values have NOT been updated on master.<br>
                    Please check the pipeline logs and fix the issue before re-releasing.
                  </p>
                </div>
                <div style="text-align:center;margin-top:20px">
                  <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                     style="background:#d9534f;color:white;padding:10px 24px;border-radius:6px;text-decoration:none;font-size:14px;display:inline-block">
                    View Failed Pipeline
                  </a>
                </div>
              </div>
              <div style="background:#f8f9fa;padding:10px 20px;border-top:1px solid #dee2e6;text-align:center">
                <p style="margin:0;font-size:12px;color:#6c757d">PayCrest DevOps • ${{ github.repository }}</p>
              </div>
            </div>
