name: Admin Service CI/CD

on:
  pull_request:
    branches: [test, master]
    paths: ['admin-service/**']
  push:
    branches: [test]
    paths: ['admin-service/**']

jobs:
  ci:
    uses: ./.github/workflows/_ci-python.yml
    with:
      service: admin-service
      image: chillmadiguys/admin-service
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_ADMIN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      DEVELOPMENT_TEAM_EMAIL: ${{ secrets.DEVELOPMENT_TEAM_EMAIL }}